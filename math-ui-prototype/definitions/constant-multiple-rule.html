  <h1>Constant Multiple Rule</h1>

  <div class="card">
    <p class="label">Definition</p>
    <p>When differentiating, constants can be pulled out:</p>
    <p>\(\frac{d}{d\theta}(c f(\theta)) = c f'(\theta)\).</p>
  </div>

  <div class="card">
    <p class="label">Simple Example (Q34)</p>
    <p>\(\frac{d}{d\theta}(2\sin\theta) = 2\frac{d}{d\theta}(\sin\theta) = 2\cos\theta\).</p>
  </div>
