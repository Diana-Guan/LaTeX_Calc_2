  <h1>Fractional Exponents</h1>

  <div class="card">
    <p class="label">Definition</p>
    <p>Fractional exponents rewrite powers as roots:</p>
    <p>\(a^{\frac{m}{n}} = \sqrt[n]{a^m} = \left(\sqrt[n]{a}\right)^m\).</p>
  </div>

  <div class="card">
    <p class="label">Simple Example (Q34)</p>
    <p>\((4-x^2)^{\frac{3}{2}} = \left((4-x^2)^{\frac{1}{2}}\right)^3 = \left(\sqrt{4-x^2}\right)^3\).</p>
  </div>
