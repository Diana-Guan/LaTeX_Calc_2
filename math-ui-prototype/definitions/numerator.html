  <h1>Numerator</h1>

  <div class="card">
    <p class="label">Definition</p>
    <p>In a fraction \(\frac{p(x)}{q(x)}\), the numerator is the top expression \(p(x)\).</p>
  </div>

  <div class="card">
    <p class="label">Simple Example</p>
    <p>In \(\frac{x^2}{(4-x^2)^{3/2}}\), the numerator is \(x^2\).</p>
    <p>In \(\frac{3}{x+1}\), the numerator is \(3\).</p>
  </div>
