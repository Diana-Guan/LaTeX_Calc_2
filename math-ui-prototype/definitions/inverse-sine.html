  <h1>\(\sin^{-1}\)</h1>

  <div class="card">
    <p class="label">Definition</p>
    <p>\(\sin^{-1}(x)\), also written \(\arcsin(x)\), returns the angle whose sine is \(x\).</p>
  </div>

  <div class="card">
    <p class="label">Simple Example (Q34)</p>
    <p>If \(\sin\theta = \frac{x}{2}\), then \(\theta = \sin^{-1}\!\left(\frac{x}{2}\right)\).</p>
